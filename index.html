<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log-it (로그잇)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { background-color: white; color: black; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        .font-sporty { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .text-overlay { color: white !important; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LogItApp = () => {
            const themes = {
                blue: { color: '#1d4ed8', bg: 'bg-blue-700', border: 'border-blue-700' },
                green: { color: '#15803d', bg: 'bg-green-700', border: 'border-green-700' },
                orange: { color: '#c2410c', bg: 'bg-orange-700', border: 'border-orange-700' }
            };

            const [currentTheme, setCurrentTheme] = useState('blue');
            const [activities, setActivities] = useState([]);
            const [activeTab, setActiveTab] = useState('library');
            const [currentActivity, setCurrentActivity] = useState(null);
            const [editMode, setEditMode] = useState(false);
            
            const [seconds, setSeconds] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const [accumulatedTime, setAccumulatedTime] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [memoValue, setMemoValue] = useState('');
            const [capturedImage, setCapturedImage] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false); 
            
            const timerRef = useRef(null);
            const captureAreaRef = useRef(null);
            const longPressTimer = useRef(null);

            // 초기 로드
            useEffect(() => {
                const saved = localStorage.getItem('logit_permanent_data');
                if (saved) { try { setActivities(JSON.parse(saved)); } catch (e) {} }
                setIsLoaded(true);
            }, []);

            // 저장
            useEffect(() => {
                if (isLoaded) {
                    try { localStorage.setItem('logit_permanent_data', JSON.stringify(activities)); } 
                    catch (e) { alert("용량 부족으로 저장에 실패했습니다. 기록을 삭제해주세요."); }
                }
            }, [activities, isLoaded]);

            // 타이머 로직
            useEffect(() => {
                if (activeTab === 'timer' && !isPaused) {
                    const start = Date.now();
                    timerRef.current = setInterval(() => {
                        setSeconds(accumulatedTime + Math.floor((Date.now() - start) / 1000));
                    }, 200);
                } else {
                    clearInterval(timerRef.current);
                    if (isPaused) setAccumulatedTime(seconds);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTab, isPaused]);

            const formatTime = (totalSec) => {
                const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const resizeImage = (base64Str, maxWidth = 800) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL("image/jpeg", 0.7));
                    };
                });
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const resized = await resizeImage(reader.result);
                    setCapturedImage(resized);
                };
                reader.readAsDataURL(file);
            };

            const saveToHistory = () => {
                if (!inputValue) return alert("수치를 입력해주세요!");
                html2canvas(captureAreaRef.current, { scale: 0.5, useCORS: true }).then(canvas => {
                    const newLog = {
                        id: Date.now(),
                        date: new Date().toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
                        time: formatTime(seconds),
                        value: inputValue,
                        memo: memoValue,
                        pace: (seconds / 60 / parseFloat(inputValue)).toFixed(1),
                        img: canvas.toDataURL("image/jpeg", 0.4),
                        rawData: { val: inputValue, sec: seconds, img: capturedImage, actName: currentActivity.name, memo: memoValue, unit: currentActivity.unit } 
                    };
                    setActivities(prev => prev.map(a => a.id === currentActivity.id ? { ...a, logs: [newLog, ...a.logs] } : a));
                    resetState();
                });
            };

            const resetState = () => {
                setSeconds(0); setAccumulatedTime(0); setInputValue(''); setMemoValue(''); setCapturedImage(null); setActiveTab('library');
            };

            // 롱프레스 핸들러
            const handleTouchStart = (act) => {
                longPressTimer.current = setTimeout(() => {
                    const mode = confirm(`'${act.name}' 활동을 수정하시겠습니까?\n(취소를 누르면 삭제 메뉴로 이동합니다)`);
                    if (mode) {
                        const newName = prompt("새 활동 이름", act.name);
                        const newUnit = prompt("새 단위", act.unit);
                        if (newName && newUnit) setActivities(prev => prev.map(a => a.id === act.id ? {...a, name: newName, unit: newUnit} : a));
                    } else {
                        if (confirm("이 활동과 모든 기록을 삭제하시겠습니까?")) {
                            setActivities(prev => prev.filter(a => a.id !== act.id));
                            alert("삭제가 완료되었습니다.");
                        }
                    }
                }, 800);
            };

            const handleTouchEnd = () => clearTimeout(longPressTimer.current);

            const deleteLog = (actId, logId) => {
                setActivities(prev => prev.map(a => a.id === actId ? { ...a, logs: a.logs.filter(l => l.id !== logId) } : a));
                alert("삭제가 완료되었습니다.");
            };

            return (
                <div className="min-h-screen bg-white text-black p-6 max-w-md mx-auto flex flex-col font-sans">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-4xl font-sporty italic font-black tracking-tighter cursor-pointer" 
                            onClick={() => { setActiveTab('library'); setEditMode(false); }}>LOG-IT</h1>
                        <div className="flex gap-2">
                            {Object.keys(themes).map(t => (
                                <button key={t} onClick={() => setCurrentTheme(t)} className={`w-6 h-6 rounded-full border-2 ${currentTheme === t ? 'border-zinc-400' : 'border-transparent'}`} style={{ backgroundColor: themes[t].color }} />
                            ))}
                        </div>
                    </header>

                    {activeTab === 'library' && (
                        <div className="flex-1 space-y-4">
                            {activities.map(act => (
                                <div key={act.id} 
                                    onMouseDown={() => handleTouchStart(act)} onMouseUp={handleTouchEnd}
                                    onTouchStart={() => handleTouchStart(act)} onTouchEnd={handleTouchEnd}
                                    className={`bg-zinc-50 p-5 rounded-3xl border-l-8 ${themes[currentTheme].border} shadow-sm flex justify-between items-center active:scale-95 transition-transform`}>
                                    <div onClick={() => { setCurrentActivity(act); setActiveTab('history'); }} className="flex-1">
                                        <h3 className="text-xl font-black leading-tight">{act.name}</h3>
                                        <p className="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">{act.logs.length} Logs · {act.unit}</p>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setCurrentActivity(act); setSeconds(0); setAccumulatedTime(0); setIsPaused(false); setActiveTab('timer'); }} 
                                            className={`${themes[currentTheme].bg} text-white font-black px-6 py-2 rounded-xl text-sm ml-2`}>GO</button>
                                </div>
                            ))}
                            <button onClick={() => {
                                const name = prompt("활동 이름");
                                const unit = prompt("단위 (예: km, page)");
                                if (name && unit) setActivities(prev => [...prev, { id: Date.now(), name, unit, logs: [] }]);
                            }} className="w-full py-5 border-2 border-dashed border-zinc-200 rounded-3xl text-zinc-400 font-bold tracking-widest">+ NEW ACTIVITY</button>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setActiveTab('library')} className="text-zinc-400 font-bold flex items-center gap-2">← <span className="text-black uppercase text-sm">{currentActivity.name}</span></button>
                                <button onClick={() => setEditMode(!editMode)} className={`text-xs font-bold px-4 py-1.5 rounded-full border ${editMode ? 'bg-red-500 border-red-500 text-white' : 'border-zinc-200 text-zinc-400'}`}>
                                    {editMode ? 'DONE' : 'EDIT'}
                                </button>
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                {currentActivity.logs.map(log => (
                                    <div key={log.id} className="relative aspect-[3/4] rounded-lg overflow-hidden bg-zinc-100">
                                        <img src={log.img} className="w-full h-full object-cover" />
                                        {editMode && (
                                            <button onClick={() => deleteLog(currentActivity.id, log.id)} className="absolute inset-0 bg-red-500/60 flex items-center justify-center">
                                                <span className="bg-white text-red-500 w-8 h-8 rounded-full flex items-center justify-center font-black">✕</span>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'timer' && (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <p className="text-sm font-black text-zinc-400 uppercase tracking-[0.2em] mb-2">{currentActivity.name}</p>
                            <div className="text-7xl font-sporty mb-12 tabular-nums" style={{ color: themes[currentTheme].color }}>{formatTime(seconds)}</div>
                            <div className="flex gap-4">
                                <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 rounded-full border-2 border-zinc-100 font-bold text-zinc-400 text-xs">{isPaused ? 'RESUME' : 'PAUSE'}</button>
                                <button onClick={() => setActiveTab('capture')} className={`w-32 h-32 rounded-full ${themes[currentTheme].bg} text-white font-black text-2xl shadow-xl`}>DONE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'capture' && (
                        <div className="flex-1 flex flex-col gap-4">
                            {!capturedImage ? (
                                <div className="flex-1 flex flex-col items-center justify-center gap-6">
                                    <div className="w-full space-y-4">
                                        <input type="number" placeholder={`${currentActivity.unit} 수치 입력`} className="w-full bg-zinc-50 p-5 rounded-2xl text-center text-3xl font-black focus:outline-none" value={inputValue} onChange={e => setInputValue(e.target.value)} />
                                        <textarea placeholder="오늘의 메모를 작성하세요" className="w-full bg-zinc-50 p-4 rounded-xl text-center text-sm font-medium focus:outline-none resize-none h-24" value={memoValue} onChange={e => setMemoValue(e.target.value)} />
                                    </div>
                                    <label className="w-full py-12 bg-zinc-900 text-white rounded-3xl font-black text-center text-xl cursor-pointer">📸 TAKE A PHOTO
                                        <input type="file" accept="image/*" capture="environment" hidden onChange={handleFileChange} />
                                    </label>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    <div ref={captureAreaRef} className="relative aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl bg-black">
                                        <img src={capturedImage} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 p-6 flex flex-col justify-between pointer-events-none text-overlay font-sporty">
                                            <div className="flex justify-between items-start">
                                                <div className="space-y-1">
                                                    <p className="text-[10px] opacity-80">TODAY</p>
                                                    <p className="text-xl font-bold">{new Date().toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                                                </div>
                                                <div className="text-right space-y-1">
                                                    <p className="text-[10px] opacity-80">LOG NAME</p>
                                                    <p className="text-xl font-bold uppercase">{currentActivity.name}</p>
                                                </div>
                                            </div>
                                            <div className="space-y-6">
                                                {memoValue && <div className="font-sans italic text-sm border-l-2 border-white/50 pl-3 py-1"><p className="leading-relaxed">"{memoValue}"</p></div>}
                                                <div className="flex justify-between items-end">
                                                    <div><p className="text-[10px] opacity-80">TIME</p><p className="text-3xl font-bold leading-tight">{formatTime(seconds)}</p></div>
                                                    <div className="text-right"><p className="text-[10px] opacity-80">PACE</p><p className="text-3xl font-bold leading-tight">{(seconds / 60 / (inputValue || 1)).toFixed(1)} min / {currentActivity.unit}</p></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCapturedImage(null)} className="flex-1 bg-zinc-100 py-5 rounded-2xl font-bold text-zinc-500">RETAKE</button>
                                        <button onClick={saveToHistory} className={`flex-1 ${themes[currentTheme].bg} text-white py-5 rounded-2xl font-black`}>SAVE LOG</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogItApp />);
    </script>
</body>
</html>
