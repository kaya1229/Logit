<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log-it (로그잇)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input { user-select: text; -webkit-user-select: text; outline: none; }
        body { background-color: white; color: black; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; }
        .font-sporty { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .text-overlay { color: white !important; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); }
        .log-canvas { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 3rem; overflow: hidden; background: #111; }
        .timer-text { font-size: 16vw; line-height: 1; letter-spacing: -0.05em; }
        @media (min-width: 448px) { .timer-text { font-size: 4.5rem; } }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.5s forwards ease-out; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const LogItApp = () => {
            const themes = {
                blue: { color: '#1d4ed8', bg: 'bg-blue-700', border: 'border-blue-700' },
                green: { color: '#15803d', bg: 'bg-green-700', border: 'border-green-700' },
                orange: { color: '#c2410c', bg: 'bg-orange-700', border: 'border-orange-700' }
            };

            const [currentTheme, setCurrentTheme] = useState('blue');
            const [activities, setActivities] = useState([]);
            const [activeTab, setActiveTab] = useState('library');
            const [currentActivity, setCurrentActivity] = useState(null);
            const [showStatsView, setShowStatsView] = useState(false);
            const [selectedLog, setSelectedLog] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isDatePopupOpen, setIsDatePopupOpen] = useState(false);
            const [modalData, setModalData] = useState({ id: null, name: '', unit: '' });
            const [viewDate, setViewDate] = useState(new Date());
            
            const [seconds, setSeconds] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const [accumulatedTime, setAccumulatedTime] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [capturedImage, setCapturedImage] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false); 
            
            const timerRef = useRef(null);
            const captureAreaRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('logit_permanent_data');
                const savedTheme = localStorage.getItem('logit_theme');
                if (savedData) { try { setActivities(JSON.parse(savedData)); } catch (e) {} }
                if (savedTheme) setCurrentTheme(savedTheme);
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) localStorage.setItem('logit_permanent_data', JSON.stringify(activities));
            }, [activities, isLoaded]);

            useEffect(() => {
                if (activeTab === 'timer' && !isPaused) {
                    const start = Date.now();
                    timerRef.current = setInterval(() => {
                        setSeconds(accumulatedTime + Math.floor((Date.now() - start) / 1000));
                    }, 200);
                } else {
                    clearInterval(timerRef.current);
                    if (isPaused) setAccumulatedTime(seconds);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTab, isPaused]);

            const formatTime = (totalSec) => {
                const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const resetState = () => {
                setSeconds(0); setAccumulatedTime(0); setInputValue(''); 
                setCapturedImage(null); setActiveTab('library'); setShowStatsView(false); setSelectedLog(null);
                setIsPaused(false);
            };

            const calculatePaceDisplay = (sec, val) => {
                const value = parseFloat(val) || 1;
                const paceInMinutes = (sec / 60) / value;
                if (paceInMinutes < 1) {
                    const paceInSeconds = (sec / value).toFixed(1);
                    return { value: paceInSeconds, unit: `s / ${currentActivity.unit}` };
                } else {
                    return { value: paceInMinutes.toFixed(1), unit: `m / ${currentActivity.unit}` };
                }
            };

            const handleImageCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = 1200 / img.width;
                        canvas.width = 1200; canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        setCapturedImage(canvas.toDataURL("image/jpeg", 0.85));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveToHistory = () => {
                const val = parseFloat(inputValue);
                if (isNaN(val)) return alert("수치를 입력하세요.");
                setTimeout(() => {
                    html2canvas(captureAreaRef.current, { scale: 2, useCORS: true, logging: false }).then(canvas => {
                        const paceData = calculatePaceDisplay(seconds, val);
                        const newLog = {
                            id: Date.now(),
                            fullDate: new Date().toISOString().split('T')[0],
                            date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }),
                            time: formatTime(seconds),
                            totalSeconds: seconds,
                            value: val,
                            pace: paceData.value,
                            paceFullUnit: paceData.unit,
                            img: canvas.toDataURL("image/jpeg", 0.8), 
                        };
                        setActivities(prev => prev.map(a => a.id === currentActivity.id ? { ...a, logs: [newLog, ...a.logs] } : a));
                        resetState();
                    });
                }, 100);
            };

            const lineChartData = useMemo(() => {
                if (!currentActivity) return [];
                const data = [];
                const today = new Date();
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const logs = currentActivity.logs.filter(l => l.fullDate === dateStr);
                    const avgPace = logs.length > 0 ? (logs.reduce((acc, curr) => acc + parseFloat(curr.pace), 0) / logs.length).toFixed(1) : 0;
                    data.push({ date: dateStr.split('-').slice(1).join('/'), avgPace: parseFloat(avgPace), unit: logs[0]?.paceFullUnit || "" });
                }
                return data;
            }, [currentActivity, activities]);

            const overallAvgPace = useMemo(() => {
                const activeDays = lineChartData.filter(d => d.avgPace > 0);
                if (activeDays.length === 0) return { value: "0.0", unit: currentActivity?.unit ? `m / ${currentActivity.unit}` : "" };
                const sum = activeDays.reduce((acc, curr) => acc + curr.avgPace, 0);
                return { value: (sum / activeDays.length).toFixed(1), unit: activeDays[0].unit };
            }, [lineChartData]);

            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const start = new Date(year, month, 1);
                const end = new Date(year, month + 1, 0);
                const days = [];
                for(let i=0; i<start.getDay(); i++) days.push(null);
                for(let i=1; i<=end.getDate(); i++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const logs = currentActivity?.logs.filter(l => l.fullDate === dateStr) || [];
                    days.push({ 
                        day: i, 
                        dateStr, 
                        totalVal: logs.reduce((acc,curr) => acc + curr.value, 0),
                        totalSec: logs.reduce((acc,curr) => acc + curr.totalSeconds, 0)
                    });
                }
                return days;
            }, [currentActivity, viewDate]);

            return (
                <div className="min-h-screen bg-white text-black p-6 max-w-md mx-auto flex flex-col font-sans" style={{"--theme-color": themes[currentTheme].color}}>
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-4xl font-sporty italic font-black tracking-tighter cursor-pointer" onClick={resetState}>LOG-IT</h1>
                        <div className="flex gap-2">
                            {Object.keys(themes).map(t => (
                                <button key={t} onClick={() => {setCurrentTheme(t); localStorage.setItem('logit_theme', t);}} className={`w-6 h-6 rounded-full border-2 ${currentTheme === t ? 'border-zinc-400' : 'border-transparent'}`} style={{ backgroundColor: themes[t].color }} />
                            ))}
                        </div>
                    </header>

                    {activeTab === 'library' && (
                        <div className="flex-1 space-y-4">
                            {activities.map(act => (
                                <div key={act.id} className={`bg-zinc-100/50 p-5 pl-7 border-l-[12px] ${themes[currentTheme].border} rounded-[2.5rem] flex justify-between items-center`}>
                                    <div onClick={() => { setCurrentActivity(act); setActiveTab('history'); }} className="flex-1">
                                        <h3 className="text-xl font-black">{act.name}</h3>
                                        <p className="text-zinc-400 text-[10px] font-bold uppercase tracking-wider">{act.logs.length} Records</p>
                                    </div>
                                    <button onClick={() => { setCurrentActivity(act); resetState(); setActiveTab('timer'); }} className={`${themes[currentTheme].bg} text-white font-black px-6 py-3 rounded-2xl text-xs shadow-lg font-sporty`}>GO</button>
                                </div>
                            ))}
                            <button onClick={() => { setModalData({id:null, name:'', unit:''}); setIsModalOpen(true); }} className="w-full py-5 border-2 border-dashed border-zinc-200 rounded-[2.5rem] text-zinc-300 font-black text-xs">+ ADD NEW ACTIVITY</button>
                        </div>
                    )}

                    {activeTab === 'history' && currentActivity && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => {setActiveTab('library'); setShowStatsView(false);}} className="text-zinc-300 font-bold">← <span className="text-black ml-1">{currentActivity.name}</span></button>
                                <button onClick={() => setShowStatsView(!showStatsView)} className="text-[10px] font-black text-zinc-400 underline uppercase tracking-widest">{showStatsView ? 'Gallery' : 'Stats'}</button>
                            </div>
                            {showStatsView ? (
                                <div className="space-y-8 pb-20">
                                    <div className="bg-zinc-50 p-6 rounded-[2.5rem]">
                                        <div className="flex justify-between items-end mb-6">
                                            <p className="text-[10px] font-black text-zinc-300 uppercase tracking-widest">Pace Trend</p>
                                            <div className="text-right">
                                                <p className="text-[8px] font-black text-zinc-300 uppercase leading-none">AVG PACE</p>
                                                <p className="text-xl font-black font-sporty italic" style={{color: themes[currentTheme].color}}>
                                                    {overallAvgPace.value} <span className="text-[10px] opacity-50">{overallAvgPace.unit}</span>
                                                </p>
                                            </div>
                                        </div>
                                        <div className="relative h-40 w-full px-2">
                                            <svg className="w-full h-full overflow-visible" viewBox="0 0 300 100">
                                                <path className="chart-line fill-none stroke-[3]" stroke={themes[currentTheme].color} d={lineChartData.reduce((path, d, i) => {
                                                    const x = (i / 6) * 300; const maxPace = Math.max(...lineChartData.map(ld => ld.avgPace), 1);
                                                    const y = 100 - (d.avgPace / maxPace) * 80; return path + `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                                                }, '')} />
                                                {lineChartData.map((d, i) => (
                                                    <g key={i}><circle cx={(i/6)*300} cy={100 - (d.avgPace / Math.max(...lineChartData.map(ld => ld.avgPace), 1)) * 80} r="3" fill={themes[currentTheme].color} />
                                                    <text x={(i/6)*300} y="115" textAnchor="middle" className="text-[7px] font-bold fill-zinc-300 uppercase tracking-tighter">{d.date}</text></g>
                                                ))}
                                            </svg>
                                        </div>
                                    </div>
                                    <div className="bg-white border border-zinc-100 p-6 rounded-[2.5rem]">
                                        <div className="flex justify-between items-center mb-6">
                                            <p className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Monthly Summary</p>
                                            <button onClick={() => setIsDatePopupOpen(true)} className="text-xs font-black uppercase font-sporty italic border-b border-black">{viewDate.toLocaleDateString('en-US', {year: 'numeric', month: 'long'})}</button>
                                        </div>
                                        <div className="grid grid-cols-7 gap-y-6 text-center">
                                            {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-[8px] font-black text-zinc-200">{d}</div>)}
                                            {calendarDays.map((d, i) => (
                                                <div key={i} className="min-h-[45px] flex flex-col items-center justify-start">
                                                    {d && <>
                                                        <span className={`text-[10px] font-bold ${d.totalVal > 0 ? 'text-black' : 'text-zinc-200'}`}>{d.day}</span>
                                                        {d.totalVal > 0 && (
                                                            <div className="mt-1 flex flex-col items-center">
                                                                <div className={`w-1 h-1 rounded-full ${themes[currentTheme].bg} mb-0.5`}></div>
                                                                <p className="text-[7px] font-black leading-none text-zinc-500">{d.totalVal.toFixed(1)}</p>
                                                                <p className="text-[6px] font-bold leading-none text-zinc-300 mt-0.5">{Math.floor(d.totalSec/60)}m</p>
                                                            </div>
                                                        )}
                                                    </>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2 pb-24">
                                    {currentActivity.logs.map(log => (
                                        <div key={log.id} onClick={() => setSelectedLog(log)} className="relative aspect-[3/4] rounded-2xl overflow-hidden bg-zinc-100"><img src={log.img} className="w-full h-full object-cover" /></div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {isDatePopupOpen && (
                        <div className="fixed inset-0 modal-overlay z-[200] flex items-center justify-center p-10">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl text-center">
                                <div className="grid grid-cols-3 gap-3">
                                    {[...Array(12)].map((_, i) => (
                                        <button key={i} onClick={() => { setViewDate(new Date(viewDate.getFullYear(), i, 1)); setIsDatePopupOpen(false); }} className={`py-3 rounded-xl font-black text-xs ${viewDate.getMonth() === i ? themes[currentTheme].bg + ' text-white' : 'bg-zinc-50 text-zinc-400'}`}>{i + 1}월</button>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center mt-6 pt-6 border-t border-zinc-100">
                                    <button onClick={() => setViewDate(new Date(viewDate.getFullYear() - 1, viewDate.getMonth(), 1))} className="text-xs font-bold text-zinc-400">Prev</button>
                                    <span className="font-black">{viewDate.getFullYear()}</span>
                                    <button onClick={() => setViewDate(new Date(viewDate.getFullYear() + 1, viewDate.getMonth(), 1))} className="text-xs font-bold text-zinc-400">Next</button>
                                </div>
                                <button onClick={() => setIsDatePopupOpen(false)} className="w-full mt-6 py-4 bg-zinc-900 text-white rounded-2xl font-black text-xs">CLOSE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'timer' && (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <p className="text-xs font-black text-zinc-300 uppercase tracking-[0.3em] mb-4">{currentActivity.name}</p>
                            <div className="timer-text font-sporty mb-20 tabular-nums" style={{ color: themes[currentTheme].color }}>{formatTime(seconds)}</div>
                            <div className="flex items-center gap-8">
                                <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 rounded-full border-2 border-zinc-100 font-black text-zinc-400 text-[10px] uppercase tracking-widest active:scale-90 transition-transform">
                                    {isPaused ? 'RESUME' : 'PAUSE'}
                                </button>
                                <button onClick={() => {setIsPaused(true); setActiveTab('capture');}} className={`w-32 h-32 rounded-full ${themes[currentTheme].bg} text-white font-black text-3xl shadow-2xl font-sporty active:scale-90 transition-transform`}>DONE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'capture' && (
                        <div className="flex-1 flex flex-col gap-4">
                            {!capturedImage ? (
                                <div className="flex-1 flex flex-col items-center justify-around">
                                    <div className="text-center">
                                        <p className="text-[10px] font-black text-zinc-300 uppercase tracking-widest mb-2">INPUT {currentActivity.unit}</p>
                                        <input type="number" placeholder="0.0" className="w-full text-center text-7xl font-black focus:outline-none" value={inputValue} onChange={e => setInputValue(e.target.value)} />
                                    </div>
                                    <label className={`w-48 h-48 rounded-full ${themes[currentTheme].bg} text-white font-black flex flex-col items-center justify-center cursor-pointer shadow-2xl`}><span className="text-2xl font-sporty italic">PHOTO</span><input type="file" accept="image/*" capture="environment" hidden onChange={handleImageCapture} /></label>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-6">
                                    <div ref={captureAreaRef} className="log-canvas">
                                        <img src={capturedImage} className="w-full h-full object-cover opacity-80" />
                                        <div className="absolute inset-0 p-10 flex flex-col justify-between pointer-events-none text-overlay font-sporty">
                                            <div className="flex justify-between">
                                                <div><p className="text-[11px] opacity-70 uppercase">Date</p><p className="text-2xl font-black">{new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</p></div>
                                                <div className="text-right"><p className="text-[11px] opacity-70 uppercase">Log</p><p className="text-2xl font-black uppercase">{currentActivity.name}</p></div>
                                            </div>
                                            <div className="flex flex-col items-end gap-8 text-right">
                                                <div><p className="text-[10px] opacity-60 uppercase mb-2 tracking-widest">Time</p><p className="text-4xl font-black leading-none">{formatTime(seconds)}</p></div>
                                                <div><p className="text-[10px] opacity-60 uppercase mb-2 tracking-widest">Pace</p><p className="text-4xl font-black leading-none">{calculatePaceDisplay(seconds, inputValue).value}<span className="text-[10px] font-bold ml-3 opacity-60 italic uppercase">{calculatePaceDisplay(seconds, inputValue).unit}</span></p></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4"><button onClick={() => setCapturedImage(null)} className="flex-1 bg-zinc-100 py-6 rounded-3xl font-black text-sm uppercase">Retake</button>
                                    <button onClick={saveToHistory} className={`flex-[2] ${themes[currentTheme].bg} text-white py-6 rounded-3xl font-black text-xl shadow-lg uppercase`}>Save Log</button></div>
                                </div>
                            )}
                        </div>
                    )}

                    {selectedLog && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-[2.5rem] shadow-2xl flex gap-3 z-[150]">
                            <button onClick={() => { const a = document.createElement('a'); a.href = selectedLog.img; a.download = 'logit.jpg'; a.click(); }} className="flex-1 py-4 bg-black text-white rounded-2xl font-black text-xs">DOWNLOAD</button>
                            <button onClick={() => { if(confirm("삭제할까요?")) { setActivities(prev => prev.map(a => a.id === currentActivity.id ? {...a, logs: a.logs.filter(l => l.id !== selectedLog.id)} : a)); setSelectedLog(null); } }} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black text-xs">DELETE</button>
                            <button onClick={() => setSelectedLog(null)} className="px-6 py-4 bg-zinc-100 rounded-2xl font-black text-xs">X</button>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 modal-overlay z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl">
                                <div className="space-y-6">
                                    <div><label className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Log Name</label><input className="w-full bg-zinc-50 p-4 rounded-2xl font-black" value={modalData.name} onChange={e => setModalData({...modalData, name: e.target.value})} /></div>
                                    <div><label className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Unit (ex: km, cycle)</label><input className="w-full bg-zinc-50 p-4 rounded-2xl font-black" value={modalData.unit} onChange={e => setModalData({...modalData, unit: e.target.value})} /></div>
                                </div>
                                <button onClick={() => { if(modalData.name && modalData.unit) { setActivities([...activities, {id: Date.now(), name: modalData.name, unit: modalData.unit, logs: []}]); setIsModalOpen(false); } }} className={`w-full mt-10 py-4 ${themes[currentTheme].bg} text-white rounded-2xl font-black uppercase`}>Save</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogItApp />);
    </script>
</body>
</html>
