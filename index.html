<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log-it (로그잇)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input { user-select: text; -webkit-user-select: text; outline: none; }
        body { background-color: white; color: black; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-sporty { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .text-overlay { color: white !important; text-shadow: 2px 2px 20px rgba(0,0,0,0.9); }
        .log-canvas { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 3rem; overflow: hidden; background: black; }
        .selected-log { outline: 4px solid var(--theme-color); outline-offset: -4px; z-index: 10; transform: scale(0.96); transition: all 0.2s ease; }
        .timer-text { font-size: 16vw; line-height: 1; letter-spacing: -0.05em; }
        @media (min-width: 448px) { .timer-text { font-size: 4.5rem; } }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .chart-svg { overflow: visible; }
        .chart-point { transition: all 0.3s ease; }
        .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.5s forwards ease-out; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const LogItApp = () => {
            const themes = {
                blue: { color: '#1d4ed8', bg: 'bg-blue-700', border: 'border-blue-700' },
                green: { color: '#15803d', bg: 'bg-green-700', border: 'border-green-700' },
                orange: { color: '#c2410c', bg: 'bg-orange-700', border: 'border-orange-700' }
            };

            const [currentTheme, setCurrentTheme] = useState('blue');
            const [activities, setActivities] = useState([]);
            const [activeTab, setActiveTab] = useState('library');
            const [currentActivity, setCurrentActivity] = useState(null);
            const [showStatsView, setShowStatsView] = useState(false);
            const [selectedLog, setSelectedLog] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalData, setModalData] = useState({ id: null, name: '', unit: '' });
            
            const [seconds, setSeconds] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const [accumulatedTime, setAccumulatedTime] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [capturedImage, setCapturedImage] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false); 
            
            const timerRef = useRef(null);
            const captureAreaRef = useRef(null);
            const longPressTimer = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('logit_permanent_data');
                const savedTheme = localStorage.getItem('logit_theme');
                if (savedData) {
                    try { setActivities(JSON.parse(savedData)); } catch (e) {}
                }
                if (savedTheme) setCurrentTheme(savedTheme);
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) localStorage.setItem('logit_permanent_data', JSON.stringify(activities));
            }, [activities, isLoaded]);

            const changeTheme = (t) => {
                setCurrentTheme(t);
                localStorage.setItem('logit_theme', t);
            };

            useEffect(() => {
                if (activeTab === 'timer' && !isPaused) {
                    const start = Date.now();
                    timerRef.current = setInterval(() => {
                        setSeconds(accumulatedTime + Math.floor((Date.now() - start) / 1000));
                    }, 200);
                } else {
                    clearInterval(timerRef.current);
                    if (isPaused) setAccumulatedTime(seconds);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTab, isPaused]);

            const formatTime = (totalSec) => {
                const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const resetState = () => {
                setSeconds(0); setAccumulatedTime(0); setInputValue(''); 
                setCapturedImage(null); setActiveTab('library'); setShowStatsView(false); setSelectedLog(null);
            };

            const openModal = (act = null) => {
                if (act) setModalData({ id: act.id, name: act.name, unit: act.unit });
                else setModalData({ id: null, name: '', unit: '' });
                setIsModalOpen(true);
            };

            const saveActivity = () => {
                if (!modalData.name || !modalData.unit) return alert("내용을 입력하세요.");
                if (modalData.id) {
                    setActivities(prev => prev.map(a => a.id === modalData.id ? {...a, name: modalData.name, unit: modalData.unit} : a));
                } else {
                    setActivities(prev => [...prev, { id: Date.now(), name: modalData.name, unit: modalData.unit, logs: [] }]);
                }
                setIsModalOpen(false);
            };

            const deleteActivity = () => {
                if (confirm("이 활동의 모든 데이터가 영구 삭제됩니다. 계속할까요?")) {
                    setActivities(prev => prev.filter(a => a.id !== modalData.id));
                    setIsModalOpen(false);
                }
            };

            const calculatePaceDisplay = (sec, val) => {
                const value = parseFloat(val) || 1;
                const paceInMinutes = (sec / 60) / value;
                if (paceInMinutes < 1) {
                    const paceInSeconds = (sec / value).toFixed(1);
                    return { value: paceInSeconds, unit: `s / ${currentActivity.unit}` };
                } else {
                    return { value: paceInMinutes.toFixed(1), unit: `m / ${currentActivity.unit}` };
                }
            };

            const saveToHistory = () => {
                const val = parseFloat(inputValue);
                if (isNaN(val)) return alert("수치를 입력하세요.");
                
                // 고화질 캡처 설정 (scale: 3 적용)
                html2canvas(captureAreaRef.current, { 
                    scale: 3, 
                    useCORS: true,
                    logging: false,
                    backgroundColor: null
                }).then(canvas => {
                    const paceData = calculatePaceDisplay(seconds, val);
                    const newLog = {
                        id: Date.now(),
                        fullDate: new Date().toISOString().split('T')[0],
                        date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }),
                        time: formatTime(seconds),
                        totalSeconds: seconds,
                        value: val,
                        pace: paceData.value,
                        paceFullUnit: paceData.unit,
                        // 고화질 저장을 위해 png 포맷 사용
                        img: canvas.toDataURL("image/png"), 
                    };
                    setActivities(prev => prev.map(a => a.id === currentActivity.id ? { ...a, logs: [newLog, ...a.logs] } : a));
                    resetState();
                });
            };

            const deleteLog = (logId) => {
                if (confirm("이 기록을 영구적으로 삭제하시겠습니까?")) {
                    setActivities(prev => prev.map(a => a.id === currentActivity.id ? {...a, logs: a.logs.filter(l => l.id !== logId)} : a));
                    setSelectedLog(null);
                }
            };

            const calendarDays = useMemo(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), 1);
                const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                const days = [];
                for(let i=0; i<start.getDay(); i++) days.push(null);
                for(let i=1; i<=end.getDate(); i++) {
                    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const logs = currentActivity?.logs.filter(l => l.fullDate === dateStr) || [];
                    days.push({ day: i, dateStr, 
                        totalVal: logs.reduce((acc,curr) => acc+curr.value, 0),
                        totalTime: logs.reduce((acc,curr) => acc+curr.totalSeconds, 0)
                    });
                }
                return days;
            }, [currentActivity]);

            const lineChartData = useMemo(() => {
                if (!currentActivity || currentActivity.logs.length === 0) return [];
                const groups = currentActivity.logs.reduce((acc, log) => {
                    if (!acc[log.fullDate]) acc[log.fullDate] = [];
                    acc[log.fullDate].push(parseFloat(log.pace));
                    return acc;
                }, {});
                const sortedDates = Object.keys(groups).sort();
                const latestDates = sortedDates.slice(-7);
                return latestDates.map(date => ({
                    date: date.split('-').slice(1).join('/'),
                    avgPace: (groups[date].reduce((a, b) => a + b, 0) / groups[date].length).toFixed(1)
                }));
            }, [currentActivity]);

            return (
                <div className="min-h-screen bg-white text-black p-6 max-w-md mx-auto flex flex-col font-sans" 
                     style={{"--theme-color": themes[currentTheme].color}}
                     onContextMenu={(e) => e.preventDefault()}>
                    
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-4xl font-sporty italic font-black tracking-tighter cursor-pointer" onClick={resetState}>LOG-IT</h1>
                        <div className="flex gap-2">
                            {Object.keys(themes).map(t => (
                                <button key={t} onClick={() => changeTheme(t)} className={`w-6 h-6 rounded-full border-2 ${currentTheme === t ? 'border-zinc-400' : 'border-transparent'}`} style={{ backgroundColor: themes[t].color }} />
                            ))}
                        </div>
                    </header>

                    {activeTab === 'library' && (
                        <div className="flex-1 space-y-4">
                            {activities.map(act => (
                                <div key={act.id} 
                                    onMouseDown={() => { longPressTimer.current = setTimeout(() => openModal(act), 600); }} 
                                    onMouseUp={() => clearTimeout(longPressTimer.current)}
                                    onTouchStart={() => { longPressTimer.current = setTimeout(() => openModal(act), 600); }} 
                                    onTouchEnd={() => clearTimeout(longPressTimer.current)}
                                    className={`bg-zinc-100/50 p-5 pl-7 border-l-[12px] ${themes[currentTheme].border} rounded-[2.5rem] flex justify-between items-center active:scale-95 transition-all`}>
                                    <div onClick={() => { setCurrentActivity(act); setActiveTab('history'); }} className="flex-1">
                                        <h3 className="text-xl font-black">{act.name}</h3>
                                        <p className="text-zinc-400 text-[10px] font-bold uppercase tracking-wider">{act.logs.length} Records · {act.unit}</p>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setCurrentActivity(act); setSeconds(0); setAccumulatedTime(0); setIsPaused(false); setActiveTab('timer'); }} 
                                            className={`${themes[currentTheme].bg} text-white font-black px-6 py-3 rounded-2xl text-xs shadow-lg font-sporty`}>GO</button>
                                </div>
                            ))}
                            <button onClick={() => openModal()} className="w-full py-5 border-2 border-dashed border-zinc-200 rounded-[2.5rem] text-zinc-300 font-black text-xs tracking-widest">+ ADD NEW ACTIVITY</button>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 modal-overlay z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl">
                                <h2 className="text-xs font-black text-zinc-300 uppercase tracking-[0.2em] mb-6 text-center">Settings</h2>
                                <div className="space-y-6">
                                    <div><label className="text-[10px] font-bold text-zinc-400 ml-2 uppercase">Log Name</label><input className="w-full bg-zinc-50 p-4 rounded-2xl font-black text-lg mt-1" value={modalData.name} onChange={e => setModalData({...modalData, name: e.target.value})} /></div>
                                    <div><label className="text-[10px] font-bold text-zinc-400 ml-2 uppercase">Unit</label><input className="w-full bg-zinc-50 p-4 rounded-2xl font-black text-lg mt-1" value={modalData.unit} onChange={e => setModalData({...modalData, unit: e.target.value})} /></div>
                                </div>
                                <div className="flex gap-3 mt-10">
                                    {modalData.id && <button onClick={deleteActivity} className="flex-1 py-4 bg-zinc-100 text-red-500 rounded-2xl font-black text-xs uppercase">Delete</button>}
                                    <button onClick={saveActivity} className={`flex-[2] py-4 ${themes[currentTheme].bg} text-white rounded-2xl font-black text-xs uppercase shadow-lg`}>Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="flex-1 relative">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => { setActiveTab('library'); setSelectedLog(null); }} className="text-zinc-300 font-bold">← <span className="text-black ml-1">{currentActivity.name}</span></button>
                                <button onClick={() => setShowStatsView(!showStatsView)} className="text-[10px] font-black text-zinc-400 underline uppercase tracking-widest">
                                    {showStatsView ? 'Gallery' : 'Stats'}
                                </button>
                            </div>

                            {showStatsView ? (
                                <div className="pb-10 space-y-8 animate-in fade-in duration-300">
                                    <div className="bg-zinc-50 p-6 rounded-[2.5rem]">
                                        <p className="text-[10px] font-black text-zinc-300 uppercase tracking-widest mb-6">Avg Pace Trends (Last 7 Days)</p>
                                        <div className="relative h-40 w-full px-2">
                                            {lineChartData.length > 1 ? (
                                                <svg className="chart-svg w-full h-full" viewBox="0 0 300 100">
                                                    <path
                                                        className="chart-line fill-none stroke-[3]"
                                                        stroke={themes[currentTheme].color}
                                                        d={lineChartData.reduce((path, d, i) => {
                                                            const x = (i / (lineChartData.length - 1)) * 300;
                                                            const maxPace = Math.max(...lineChartData.map(ld => parseFloat(ld.avgPace)));
                                                            const y = 100 - (parseFloat(d.avgPace) / (maxPace || 1)) * 80;
                                                            return path + `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                                                        }, '')}
                                                    />
                                                    {lineChartData.map((d, i) => {
                                                        const x = (i / (lineChartData.length - 1)) * 300;
                                                        const maxPace = Math.max(...lineChartData.map(ld => parseFloat(ld.avgPace)));
                                                        const y = 100 - (parseFloat(d.avgPace) / (maxPace || 1)) * 80;
                                                        return (
                                                            <g key={i} className="chart-point">
                                                                <circle cx={x} cy={y} r="4" fill="white" stroke={themes[currentTheme].color} strokeWidth="2" />
                                                                <text x={x} y={y - 10} textAnchor="middle" className="text-[8px] font-black fill-zinc-400">{d.avgPace}</text>
                                                                <text x={x} y="115" textAnchor="middle" className="text-[7px] font-bold fill-zinc-300 uppercase tracking-tighter">{d.date}</text>
                                                            </g>
                                                        );
                                                    })}
                                                </svg>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-zinc-200 text-[10px] font-black uppercase tracking-widest">More logs needed for chart</div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white border border-zinc-100 p-6 rounded-[2.5rem]">
                                        <div className="flex justify-between items-center mb-6 px-2">
                                            <p className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Daily Summary</p>
                                            <p className="text-xs font-black uppercase font-sporty italic">{new Date().toLocaleDateString('en-US', {month: 'long'})}</p>
                                        </div>
                                        <div className="grid grid-cols-7 gap-y-4 text-center">
                                            {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-[8px] font-black text-zinc-200">{d}</div>)}
                                            {calendarDays.map((d, i) => (
                                                <div key={i} className="min-h-[45px] flex flex-col items-center">
                                                    {d ? (
                                                        <>
                                                            <span className={`text-[10px] font-bold ${d.totalVal > 0 ? 'text-black' : 'text-zinc-200'}`}>{d.day}</span>
                                                            {d.totalVal > 0 && (
                                                                <div className="mt-1 flex flex-col items-center">
                                                                    <div className={`w-1 h-1 rounded-full ${themes[currentTheme].bg} mb-1`}></div>
                                                                    <p className="text-[7px] font-black leading-none text-zinc-500">{d.totalVal.toFixed(1)}</p>
                                                                    <p className="text-[6px] font-bold leading-none text-zinc-300 mt-0.5">{Math.floor(d.totalTime/60)}m</p>
                                                                </div>
                                                            )}
                                                        </>
                                                    ) : <div />}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2 pb-24">
                                    {currentActivity.logs.map(log => (
                                        <div key={log.id} onClick={() => setSelectedLog(selectedLog?.id === log.id ? null : log)}
                                            className={`relative aspect-[3/4] rounded-2xl overflow-hidden bg-zinc-100 shadow-sm ${selectedLog?.id === log.id ? 'selected-log' : ''}`}>
                                            {log.img ? <img src={log.img} className="w-full h-full object-cover" /> : 
                                                <div className="w-full h-full flex flex-col items-center justify-center p-2 text-center bg-zinc-200/50">
                                                    <p className="text-[9px] font-black text-zinc-400 mb-1">{log.date}</p>
                                                    <p className="text-xs font-black leading-tight text-zinc-700">{log.value}{currentActivity.unit}</p>
                                                </div>
                                            }
                                        </div>
                                    ))}
                                </div>
                            )}

                            {selectedLog && (
                                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white border border-zinc-100 p-4 rounded-[2.5rem] shadow-2xl flex gap-3 z-50">
                                    <button onClick={() => {
                                        const link = document.createElement('a'); link.href = selectedLog.img; link.download = `logit_${selectedLog.id}.png`; link.click(); setSelectedLog(null);
                                    }} className="flex-1 py-4 bg-zinc-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest">Download</button>
                                    <button onClick={() => deleteLog(selectedLog.id)} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black text-xs uppercase tracking-widest">Delete</button>
                                    <button onClick={() => setSelectedLog(null)} className="w-12 py-4 bg-zinc-100 text-zinc-400 rounded-2xl font-black font-sporty">X</button>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'timer' && (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <p className="text-xs font-black text-zinc-300 uppercase tracking-[0.3em] mb-4">{currentActivity.name}</p>
                            <div className="timer-text font-sporty mb-20 tabular-nums" style={{ color: themes[currentTheme].color }}>{formatTime(seconds)}</div>
                            <div className="flex items-center gap-8">
                                <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 rounded-full border-2 border-zinc-100 font-black text-zinc-300 text-[10px] uppercase tracking-widest">{isPaused ? 'RESUME' : 'PAUSE'}</button>
                                <button onClick={() => setActiveTab('capture')} className={`w-32 h-32 rounded-full ${themes[currentTheme].bg} text-white font-black text-3xl shadow-2xl active:scale-90 transition-transform font-sporty`}>DONE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'capture' && (
                        <div className="flex-1 flex flex-col gap-4">
                            {!capturedImage ? (
                                <div className="flex-1 flex flex-col items-center justify-around py-10">
                                    <div className="text-center">
                                        <p className="text-[10px] font-black text-zinc-300 uppercase mb-2 tracking-widest">Input {currentActivity.unit}</p>
                                        <input type="number" placeholder="0.0" className="w-full bg-transparent p-4 text-center text-7xl font-black focus:outline-none placeholder-zinc-100" value={inputValue} onChange={e => setInputValue(e.target.value)} />
                                    </div>
                                    <label className={`w-48 h-48 rounded-full ${themes[currentTheme].bg} text-white font-black flex flex-col items-center justify-center gap-1 shadow-2xl active:scale-95 transition-transform cursor-pointer`}>
                                        <span className="text-3xl uppercase font-sporty italic">PHOTO</span>
                                        <span className="text-[9px] opacity-60 tracking-widest uppercase">Tap to Capture</span>
                                        <input type="file" accept="image/*" capture="environment" hidden onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const r = new FileReader();
                                                r.onloadend = () => {
                                                    const img = new Image();
                                                    img.src = r.result;
                                                    img.onload = () => {
                                                        const canvas = document.createElement('canvas');
                                                        // 내부 이미지 처리 해상도 강화 (2000px 기준)
                                                        const scale = 2000 / img.width;
                                                        canvas.width = 2000; canvas.height = img.height * scale;
                                                        const ctx = canvas.getContext('2d');
                                                        ctx.imageSmoothingEnabled = true;
                                                        ctx.imageSmoothingQuality = 'high';
                                                        ctx.drawImage(img, 0, 0, 2000, canvas.height);
                                                        setCapturedImage(canvas.toDataURL("image/png"));
                                                    }
                                                };
                                                r.readAsDataURL(file);
                                            }
                                        }} />
                                    </label>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-6">
                                    <div ref={captureAreaRef} className="log-canvas">
                                        <img src={capturedImage} className="w-full h-full object-cover opacity-80" />
                                        <div className="absolute inset-0 p-10 flex flex-col justify-between pointer-events-none text-overlay font-sporty">
                                            <div className="flex justify-between items-start">
                                                <div><p className="text-[11px] opacity-70 tracking-[0.2em] mb-1">DATE</p><p className="text-2xl font-black tracking-tighter">{new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</p></div>
                                                <div className="text-right"><p className="text-[11px] opacity-70 tracking-[0.2em] mb-1">LOG</p><p className="text-2xl font-black uppercase tracking-tighter">{currentActivity.name}</p></div>
                                            </div>
                                            <div className="flex flex-col items-end gap-10 text-right">
                                                <div>
                                                    <p className="text-[10px] opacity-60 uppercase tracking-[0.3em] mb-2">Time</p>
                                                    <p className="text-4xl font-black tracking-tighter leading-none">{formatTime(seconds)}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] opacity-60 uppercase tracking-[0.3em] mb-2">Pace</p>
                                                    <p className="text-4xl font-black tracking-tighter leading-none">
                                                        {calculatePaceDisplay(seconds, inputValue).value}
                                                        <span className="text-[10px] font-bold ml-3 opacity-60 italic tracking-widest uppercase">
                                                            {calculatePaceDisplay(seconds, inputValue).unit}
                                                        </span>
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setCapturedImage(null)} className="flex-1 bg-zinc-100 py-6 rounded-3xl font-black text-zinc-400 text-sm uppercase tracking-widest">Retake</button>
                                        <button onClick={saveToHistory} className={`flex-[2] ${themes[currentTheme].bg} text-white py-6 rounded-3xl font-black text-xl shadow-lg uppercase tracking-widest`}>Save Log</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogItApp />);
    </script>
</body>
</html>
