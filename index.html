<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log-it (로그잇)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Noto+Sans+KR:wght@900&display=swap');
        
        body { 
            background-color: white; 
            -webkit-tap-highlight-color: transparent; 
            color: black; 
            overflow-x: hidden;
            font-family: 'Noto Sans KR', sans-serif; /* 기본 한글 폰트 */
        }
        
        /* 영문/수치용 스포티 폰트 */
        .font-sporty { 
            font-family: 'Montserrat', sans-serif; 
            font-style: italic; 
            font-weight: 900;
        }

        /* [요청] 디자인 반전: 흰색 글씨 + 컬러 테두리 */
        /* [요청] 글씨 잘림 방지를 위해 paint-order 설정 */
        .text-overlay { 
            color: white !important; /* 글씨 자체는 흰색 */
            paint-order: stroke fill; /* 테두리를 먼저 그리고 글씨를 채워 안쪽 잘림 방지 */
            -webkit-text-stroke-width: 2px; /* 테두리 두께 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); /* 약간의 그림자로 입체감 추가 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LogItApp = () => {
            const themes = {
                blue: { color: '#1d4ed8', bg: 'bg-blue-700', border: 'border-blue-700', stroke: '#1d4ed8' },
                green: { color: '#15803d', bg: 'bg-green-700', border: 'border-green-700', stroke: '#15803d' },
                orange: { color: '#c2410c', bg: 'bg-orange-700', border: 'border-orange-700', stroke: '#c2410c' }
            };

            const [currentTheme, setCurrentTheme] = useState('blue');
            const [activities, setActivities] = useState([]);
            const [activeTab, setActiveTab] = useState('library');
            const [currentActivity, setCurrentActivity] = useState(null);
            
            const [seconds, setSeconds] = useState(0);
            const [startTime, setStartTime] = useState(null); 
            const [isPaused, setIsPaused] = useState(false);
            const [accumulatedTime, setAccumulatedTime] = useState(0);

            const [inputValue, setInputValue] = useState('');
            const [capturedImage, setCapturedImage] = useState(null);
            
            const timerRef = useRef(null);
            const wakeLockRef = useRef(null);
            const captureAreaRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch (err) {}
                }
            };

            const releaseWakeLock = () => {
                if (wakeLockRef.current) { wakeLockRef.current.release(); wakeLockRef.current = null; }
            };

            useEffect(() => {
                const saved = localStorage.getItem('logit_white_v3');
                if (saved) setActivities(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('logit_white_v3', JSON.stringify(activities));
            }, [activities]);

            useEffect(() => {
                if (activeTab === 'timer' && !isPaused) {
                    requestWakeLock();
                    const start = Date.now();
                    setStartTime(start);
                    timerRef.current = setInterval(() => {
                        const now = Date.now();
                        const diff = Math.floor((now - start) / 1000);
                        setSeconds(accumulatedTime + diff);
                    }, 100); 
                } else {
                    clearInterval(timerRef.current);
                    releaseWakeLock();
                    if (isPaused) setAccumulatedTime(seconds);
                }
                return () => { clearInterval(timerRef.current); releaseWakeLock(); };
            }, [activeTab, isPaused]);

            const formatTime = (totalSec) => {
                const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const saveLog = () => {
                if (!inputValue) return alert("수치를 입력해주세요!");
                //html2canvas 옵션 조정으로 가독성 향상
                html2canvas(captureAreaRef.current, {scale: 2, useCORS: true}).then(canvas => {
                    const pace = (seconds / 60 / parseFloat(inputValue)).toFixed(1);
                    const newLog = {
                        id: Date.now(),
                        timestamp: Date.now(),
                        date: new Date().toLocaleDateString(),
                        time: formatTime(seconds),
                        value: inputValue,
                        pace: pace,
                        img: canvas.toDataURL("image/png"),
                        isExpired: false
                    };
                    const updated = activities.map(a => a.id === currentActivity.id ? { ...a, logs: [newLog, ...a.logs] } : a);
                    setActivities(updated);
                    setSeconds(0); setAccumulatedTime(0); setInputValue(''); setCapturedImage(null); setActiveTab('library');
                });
            };

            // 테두리 컬러 스타일 생성
            const getStrokeStyle = () => ({
                WebkitTextStrokeColor: themes[currentTheme].stroke,
            });

            return (
                <div className="min-h-screen bg-white text-black p-6 max-w-md mx-auto flex flex-col font-sans">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-4xl font-sporty tracking-tighter">LOG-IT</h1>
                        <div className="flex gap-2">
                            {['blue', 'green', 'orange'].map(t => (
                                <button key={t} onClick={() => setCurrentTheme(t)} 
                                    className={`w-6 h-6 rounded-full border-2 ${currentTheme === t ? 'border-zinc-400' : 'border-transparent'}`}
                                    style={{ backgroundColor: themes[t].color }} />
                            ))}
                        </div>
                    </header>

                    {activeTab === 'library' && (
                        <div className="flex-1 space-y-4">
                            {activities.map(act => (
                                <div key={act.id} className={`bg-zinc-50 p-5 rounded-3xl border-l-8 ${themes[currentTheme].border} shadow-sm flex justify-between items-center`}>
                                    <div onClick={() => { setCurrentActivity(act); setActiveTab('history'); }} className="cursor-pointer">
                                        <h3 className="text-xl font-black">{act.name}</h3>
                                        <p className="text-zinc-400 text-xs font-bold uppercase">Logs: {act.logs.length}</p>
                                    </div>
                                    <button onClick={() => { setCurrentActivity(act); setSeconds(0); setAccumulatedTime(0); setIsPaused(false); setActiveTab('timer'); }} className={`${themes[currentTheme].bg} text-white font-black px-5 py-2 rounded-xl text-sm`}>GO</button>
                                </div>
                            ))}
                            <button onClick={() => {
                                const name = prompt("활동 이름 (예: 독서)");
                                const unit = prompt("단위 (예: p, match)");
                                if (name && unit) setActivities([...activities, { id: Date.now(), name, unit, logs: [] }]);
                            }} className="w-full py-5 border-2 border-dashed border-zinc-200 rounded-3xl text-zinc-400 font-bold">+ NEW ACTIVITY</button>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="flex-1">
                            <button onClick={() => setActiveTab('library')} className="mb-4 text-zinc-400 font-bold">← BACK</button>
                            <div className="grid grid-cols-2 gap-3">
                                {currentActivity.logs.map(log => (
                                    <div key={log.id} className="bg-zinc-50 rounded-2xl overflow-hidden border border-zinc-100 shadow-sm">
                                        {log.img && !log.isExpired ? <img src={log.img} className="w-full aspect-[3/4] object-cover" /> : <div className="aspect-[3/4] flex items-center justify-center text-[10px] text-zinc-300 p-4 text-center bg-zinc-100">EXPIRED</div>}
                                        <div className="p-2 text-[11px] font-bold text-zinc-600">{log.date} · {log.value}{currentActivity.unit[0]}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'timer' && (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="text-zinc-300 font-sporty mb-4 uppercase tracking-widest text-sm">{currentActivity.name}</div>
                            <div className="text-7xl font-sporty mb-12 tabular-nums" style={{ color: themes[currentTheme].color }}>{formatTime(seconds)}</div>
                            <div className="flex gap-4">
                                <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 rounded-full border-2 border-zinc-100 font-bold text-zinc-400 text-sm">
                                    {isPaused ? 'RESUME' : 'PAUSE'}
                                </button>
                                <button onClick={() => setActiveTab('capture')} className={`w-32 h-32 rounded-full ${themes[currentTheme].bg} text-white font-black text-2xl shadow-xl`}>DONE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'capture' && (
                        <div className="flex-1 flex flex-col gap-4">
                            {!capturedImage ? (
                                <div className="flex-1 flex flex-col items-center justify-center gap-6">
                                    <input type="number" placeholder={`${currentActivity.unit} 수치 입력`} className="w-full bg-zinc-50 p-5 rounded-2xl text-center text-3xl font-black border-none focus:ring-0" value={inputValue} onChange={e => setInputValue(e.target.value)} />
                                    <label className="w-full py-12 bg-zinc-900 text-white rounded-3xl font-black text-center text-xl cursor-pointer shadow-lg">📸 TAKE A PHOTO
                                        <input type="file" accept="image/*" capture="environment" hidden onChange={e => setCapturedImage(URL.createObjectURL(e.target.files[0]))} />
                                    </label>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    {/* [요청] 글씨 잘림 방지를 위해 p-8 여백 및 layout 조정 */}
                                    <div ref={captureAreaRef} className="relative aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl">
                                        <img src={capturedImage} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
                                            {/* 한글 활동명: 볼드체 + 반전 디자인 */}
                                            <h3 className="text-2xl font-black text-overlay" style={getStrokeStyle()}>
                                                {currentActivity.name} 기록
                                            </h3>
                                            <div className="space-y-2 text-right">
                                                {/* 영문/수치: font-sporty + 반전 디자인 */}
                                                <p className="text-5xl font-sporty text-overlay leading-none" style={getStrokeStyle()}>
                                                    {inputValue} {currentActivity.unit}
                                                </p>
                                                <div className="flex justify-between font-sporty text-overlay text-2xl" style={getStrokeStyle()}>
                                                    <span>{formatTime(seconds)}</span>
                                                    <span>{(seconds / 60 / inputValue).toFixed(1)}m/{currentActivity.unit[0]}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCapturedImage(null)} className="flex-1 bg-zinc-100 py-5 rounded-2xl font-bold text-zinc-500">RETAKE</button>
                                        <button onClick={saveLog} className={`flex-1 ${themes[currentTheme].bg} text-white py-5 rounded-2xl font-black`}>SAVE LOG</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogItApp />);
    </script>
</body>
</html>
