<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log-it (로그잇)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;900&display=swap');
        body { background-color: white; color: black; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-sporty { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .text-overlay { color: white !important; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); }
        /* 삭제 모드일 때 흔들리는 애니메이션 (선택사항) */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }
        .edit-shake { animation: shake 0.3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LogItApp = () => {
            const themes = {
                blue: { color: '#1d4ed8', bg: 'bg-blue-700', border: 'border-blue-700' },
                green: { color: '#15803d', bg: 'bg-green-700', border: 'border-green-700' },
                orange: { color: '#c2410c', bg: 'bg-orange-700', border: 'border-orange-700' }
            };

            const [currentTheme, setCurrentTheme] = useState('blue');
            const [activities, setActivities] = useState([]);
            const [activeTab, setActiveTab] = useState('library');
            const [currentActivity, setCurrentActivity] = useState(null);
            const [editMode, setEditMode] = useState(false);
            
            const [seconds, setSeconds] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const [accumulatedTime, setAccumulatedTime] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [memoValue, setMemoValue] = useState('');
            const [capturedImage, setCapturedImage] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false); 
            
            const timerRef = useRef(null);
            const captureAreaRef = useRef(null);

            const getFormattedDate = () => {
                const date = new Date();
                return `${date.toLocaleString('en-US', { month: 'long' })} ${date.getDate()}, ${date.getFullYear()}`;
            };

            useEffect(() => {
                const saved = localStorage.getItem('logit_permanent_data');
                if (saved) {
                    try { setActivities(JSON.parse(saved)); } catch (e) {}
                }
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    try {
                        localStorage.setItem('logit_permanent_data', JSON.stringify(activities));
                    } catch (e) {
                        alert("저장 공간이 가득 찼습니다. 오래된 기록을 삭제해주세요!");
                    }
                }
            }, [activities, isLoaded]);

            useEffect(() => {
                if (activeTab === 'timer' && !isPaused) {
                    const start = Date.now();
                    timerRef.current = setInterval(() => {
                        setSeconds(accumulatedTime + Math.floor((Date.now() - start) / 1000));
                    }, 200);
                } else {
                    clearInterval(timerRef.current);
                    if (isPaused) setAccumulatedTime(seconds);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTab, isPaused]);

            const formatTime = (totalSec) => {
                const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const resizeImage = (base64Str, maxWidth = 800) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL("image/jpeg", 0.7));
                    };
                });
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const resized = await resizeImage(reader.result);
                    setCapturedImage(resized);
                };
                reader.readAsDataURL(file);
            };

            const saveToHistory = () => {
                if (!inputValue) return alert("수치를 입력해주세요!");
                html2canvas(captureAreaRef.current, { scale: 0.4, useCORS: true }).then(canvas => {
                    const newLog = {
                        id: Date.now(),
                        date: getFormattedDate(),
                        time: formatTime(seconds),
                        value: inputValue,
                        memo: memoValue,
                        pace: (seconds / 60 / parseFloat(inputValue)).toFixed(1),
                        img: canvas.toDataURL("image/jpeg", 0.4),
                        rawData: { val: inputValue, sec: seconds, img: capturedImage, actName: currentActivity.name, memo: memoValue } 
                    };
                    setActivities(prev => prev.map(a => a.id === currentActivity.id ? { ...a, logs: [newLog, ...a.logs] } : a));
                    setSeconds(0); setAccumulatedTime(0); setInputValue(''); setMemoValue(''); setCapturedImage(null); setActiveTab('library');
                });
            };

            const editActivity = (id) => {
                const act = activities.find(a => a.id === id);
                const newName = prompt("활동 이름 수정", act.name);
                const newUnit = prompt("단위 수정", act.unit);
                if (newName && newUnit) {
                    setActivities(prev => prev.map(a => a.id === id ? { ...a, name: newName, unit: newUnit } : a));
                }
            };

            const deleteActivity = (id) => {
                if (confirm("이 활동과 모든 기록을 삭제할까요?")) {
                    setActivities(prev => prev.filter(act => act.id !== id));
                }
            };

            const deleteLog = (actId, logId) => {
                setActivities(prev => prev.map(a => 
                    a.id === actId ? { ...a, logs: a.logs.filter(l => l.id !== logId) } : a
                ));
            };

            const downloadHighRes = (log) => {
                if (editMode) return;
                const drawArea = document.createElement('div');
                drawArea.style.cssText = 'width:600px; height:1000px; position:fixed; top:-9999px; left:-9999px; background:black;';
                drawArea.innerHTML = `
                    <div id="capture-target" style="width:600px; height:1000px; position:relative; overflow:hidden; font-family:'Montserrat';">
                        <img src="${log.rawData.img}" style="width:100%; height:100%; object-fit:cover;">
                        <div style="position:absolute; inset:0; padding:50px; display:flex; flex-direction:column; justify-content:flex-start; color:white;">
                            <div style="margin-bottom:auto;">
                                <div style="margin-bottom:25px;">
                                    <p style="font-size:18px; font-weight:400; margin:0; opacity:0.8;">TODAY</p>
                                    <p style="font-size:38px; font-weight:700; margin:0; text-shadow:2px 2px 10px black;">${log.date}</p>
                                </div>
                                <div>
                                    <p style="font-size:18px; font-weight:400; margin:0; opacity:0.8;">LOG NAME</p>
                                    <p style="font-size:38px; font-weight:700; margin:0; text-shadow:2px 2px 10px black; text-transform:uppercase;">${log.rawData.actName}</p>
                                </div>
                            </div>
                            ${log.rawData.memo ? `<p style="font-size:22px; margin-bottom:50px; text-shadow:2px 2px 10px black; font-family:'Noto Sans KR';">"${log.rawData.memo}"</p>` : ''}
                            <div style="align-self:flex-end; text-align:right; margin-bottom:150px;">
                                <div style="margin-bottom:25px;">
                                    <p style="font-size:18px; opacity:0.8; margin:0;">TIME</p>
                                    <p style="font-size:50px; font-weight:700; margin:0; text-shadow:2px 2px 10px black;">${log.time}</p>
                                </div>
                                <div>
                                    <p style="font-size:18px; opacity:0.8; margin:0;">PACE</p>
                                    <p style="font-size:50px; font-weight:700; margin:0; text-shadow:2px 2px 10px black;">${log.pace} min / unit</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(drawArea);
                setTimeout(() => {
                    html2canvas(document.getElementById('capture-target'), { scale: 2.5, useCORS: true }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `logit_${Date.now()}.png`;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        document.body.removeChild(drawArea);
                    });
                }, 300);
            };

            return (
                <div className="min-h-screen bg-white text-black p-6 max-w-md mx-auto flex flex-col font-sans">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-4xl font-sporty italic font-black tracking-tighter cursor-pointer" onClick={() => setActiveTab('library')}>LOG-IT</h1>
                        <div className="flex gap-2">
                            {Object.keys(themes).map(t => (
                                <button key={t} onClick={() => setCurrentTheme(t)} className={`w-6 h-6 rounded-full border-2 ${currentTheme === t ? 'border-zinc-400' : 'border-transparent'}`} style={{ backgroundColor: themes[t].color }} />
                            ))}
                        </div>
                    </header>

                    {activeTab === 'library' && (
                        <div className="flex-1 space-y-4">
                            {activities.map(act => (
                                <div key={act.id} className={`bg-zinc-50 p-5 rounded-3xl border-l-8 ${themes[currentTheme].border} shadow-sm flex justify-between items-center group relative`}>
                                    <div onClick={() => { setCurrentActivity(act); setActiveTab('history'); setEditMode(false); }} className="cursor-pointer flex-1">
                                        <h3 className="text-xl font-black leading-tight">{act.name}</h3>
                                        <p className="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">{act.logs.length} Logs · {act.unit}</p>
                                    </div>
                                    <div className="flex gap-3 items-center">
                                        <button onClick={() => editActivity(act.id)} className="text-zinc-300 text-[10px] font-bold uppercase">Edit</button>
                                        <button onClick={() => deleteActivity(act.id)} className="text-zinc-300 text-[10px] font-bold uppercase">Del</button>
                                        <button onClick={() => { setCurrentActivity(act); setSeconds(0); setAccumulatedTime(0); setIsPaused(false); setActiveTab('timer'); }} className={`${themes[currentTheme].bg} text-white font-black px-6 py-2 rounded-xl text-sm ml-2`}>GO</button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => {
                                const name = prompt("활동 이름");
                                const unit = prompt("단위");
                                if (name && unit) setActivities(prev => [...prev, { id: Date.now(), name, unit, logs: [] }]);
                            }} className="w-full py-5 border-2 border-dashed border-zinc-200 rounded-3xl text-zinc-400 font-bold tracking-widest">+ NEW ACTIVITY</button>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setActiveTab('library')} className="text-zinc-400 font-bold flex items-center gap-2">← <span className="text-black uppercase text-sm tracking-tighter">{currentActivity.name}</span></button>
                                <button onClick={() => setEditMode(!editMode)} className={`text-xs font-bold px-4 py-1.5 rounded-full border transition-all ${editMode ? 'bg-red-500 border-red-500 text-white' : 'border-zinc-200 text-zinc-400'}`}>
                                    {editMode ? 'DONE' : 'EDIT'}
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-3 gap-2 pb-8">
                                {currentActivity.logs.map(log => (
                                    <div key={log.id} className={`relative aspect-[3/4] overflow-hidden rounded-lg bg-zinc-100 shadow-sm ${editMode ? 'edit-shake' : ''}`}>
                                        <div onClick={() => downloadHighRes(log)} className="w-full h-full cursor-pointer active:opacity-70">
                                            <img src={log.img} className="w-full h-full object-cover" />
                                        </div>
                                        {editMode && (
                                            <button onClick={() => deleteLog(currentActivity.id, log.id)} className="absolute inset-0 bg-red-500/50 flex items-center justify-center backdrop-blur-[1px]">
                                                <span className="bg-white text-red-500 w-7 h-7 rounded-full flex items-center justify-center font-black text-sm shadow-xl">✕</span>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'timer' && (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="text-7xl font-sporty mb-12 tabular-nums" style={{ color: themes[currentTheme].color }}>{formatTime(seconds)}</div>
                            <div className="flex gap-4">
                                <button onClick={() => setIsPaused(!isPaused)} className="w-20 h-20 rounded-full border-2 border-zinc-100 font-bold text-zinc-400 text-xs">{isPaused ? 'RESUME' : 'PAUSE'}</button>
                                <button onClick={() => setActiveTab('capture')} className={`w-32 h-32 rounded-full ${themes[currentTheme].bg} text-white font-black text-2xl shadow-xl`}>DONE</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'capture' && (
                        <div className="flex-1 flex flex-col gap-4">
                            {!capturedImage ? (
                                <div className="flex-1 flex flex-col items-center justify-center gap-6">
                                    <div className="w-full space-y-4">
                                        <input type="number" placeholder={`${currentActivity.unit} 수치`} className="w-full bg-zinc-50 p-5 rounded-2xl text-center text-3xl font-black focus:outline-none" value={inputValue} onChange={e => setInputValue(e.target.value)} />
                                        <input type="text" placeholder="메모 (선택사항)" className="w-full bg-zinc-50 p-4 rounded-xl text-center text-sm font-medium focus:outline-none" value={memoValue} onChange={e => setMemoValue(e.target.value)} />
                                    </div>
                                    <label className="w-full py-12 bg-zinc-900 text-white rounded-3xl font-black text-center text-xl cursor-pointer">📸 TAKE A PHOTO
                                        <input type="file" accept="image/*" capture="environment" hidden onChange={handleFileChange} />
                                    </label>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    <div ref={captureAreaRef} className="relative aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl bg-black">
                                        <img src={capturedImage} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 p-6 flex flex-col justify-start pointer-events-none text-overlay font-sporty">
                                            <div className="mb-auto space-y-4">
                                                <div><p className="text-[10px] opacity-80">TODAY</p><p className="text-xl font-bold">{getFormattedDate()}</p></div>
                                                <div><p className="text-[10px] opacity-80">LOG NAME</p><p className="text-xl font-bold uppercase">{currentActivity.name}</p></div>
                                            </div>
                                            {memoValue && <div className="my-4 font-sans italic text-sm"><p>"{memoValue}"</p></div>}
                                            <div className="self-end text-right space-y-4 mb-20">
                                                <div><p className="text-[10px] opacity-80">TIME</p><p className="text-2xl font-bold">{formatTime(seconds)}</p></div>
                                                <div><p className="text-[10px] opacity-80">PACE</p><p className="text-2xl font-bold">{(seconds / 60 / inputValue).toFixed(1)} min / unit</p></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCapturedImage(null)} className="flex-1 bg-zinc-100 py-5 rounded-2xl font-bold text-zinc-500">RETAKE</button>
                                        <button onClick={saveToHistory} className={`flex-1 ${themes[currentTheme].bg} text-white py-5 rounded-2xl font-black`}>SAVE LOG</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LogItApp />);
    </script>
</body>
</html>
